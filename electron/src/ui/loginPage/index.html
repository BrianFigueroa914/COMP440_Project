<!DOCTYPE html>
<html lang="en"> 
<head> 
  <meta charset="UTF-8" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title>Login</title> <link rel="stylesheet" href="../../../styles.css">
</head> 
<body>
<div class="login-container">

  <div class="header">
    <div class="logo">
      <img src="../../../logo.png" alt="Logo">
    </div>
    <h2>Place Holding INC.</h2>
  </div>

  <form id="loginForm">

    <div class="input-group">
      <label for="username">Username</label> 
      <input id="username" type="text" required minlength="3" 
      maxlength="50" pattern="[a-zA-Z0-9_-]+" placeholder="3-50 chars: letters, numbers, - or _" /> 
      <small class="help-text">Only letters, numbers, underscores, and hyphens allowed</small>
    </div>

    <div class="input-group">
      <label for="password">Password</label> 
      <input id="password" type="password" required minlength="6" 
      maxlength="128" placeholder="6-128 characters" />
    </div>

    <p class="error" id="errorMsg"></p>

    <div class="button-group">
      <button type="submit">Login</button>
      <button type="button" id="signupBtn">Switch to Sign Up →</button>
    </div>

  </form>
</div>
<script src="../utils/validation.js"></script>
<script src="login.js"></script>

</body>
</html>
